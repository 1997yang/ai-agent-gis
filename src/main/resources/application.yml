server:
  port: 8080

mybatis:
  # 确保扫描路径包含了您的 XML 文件所在目录
  mapper-locations: classpath*:/mapper//*.xml
#  configuration:
#    map-underscore-to-camel-case:true

spring:
  application:
    name: gis-ai-agent

  # 数据库配置 (PostgreSQL + PostGIS)
  datasource:
    url: jdbc:postgresql://192.168.120.126:5432/org
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  # 自动执行建表语句（建表语句由 Spring AI 内置提供）
  sql:
    init:
      mode: always

  # Spring AI 配置（对接 DeepSeek）
  # DeepSeek API 完全兼容 OpenAI 规范，因此 baseUrl 指定为 DeepSeek 的域名，模型名称填 deepseek-chat
  # base_url (OpenAI)	https://api.deepseek.com
  # base_url (Anthropic)	https://api.deepseek.com/anthropic
  # https://api-docs.deepseek.com/zh-cn/
  ai:
    openai:
      api-key: sk-2b25845b50a4842b0996ee59b1524c8
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-v4-pro
          temperature: 0.7

    # 开启 JDBC Chat Memory 的自动建表功能（Spring AI 会在启动时自动创建 chat_memory 表）
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema:always

    mcp:
      server:
        protocol=STREAMABLE
      client:
        streamable-http:
          connections:
            weather-server:
              url: http://localhost:8080